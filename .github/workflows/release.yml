# Versioned release workflow.
# Only pushed v* tags enter this workflow. It verifies the tag/version match,
# builds the release bundle, publishes GitHub release assets, and then waits at
# the ctan-release environment before any CTAN upload can continue.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      TEXINPUTS: 'tex/latex//:'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify tag matches VERSION
        run: python3 tools/check_release_tag.py --tag "${{ github.ref_name }}"

      - name: Install TeX and site tooling
        run: |
          sudo apt-get -o Acquire::Retries=3 update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            latexmk \
            lmodern \
            poppler-utils \
            texlive-fonts-recommended \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-latex-recommended \
            texlive-pictures

      - name: Build docs and examples
        run: |
          latexmk -pdf -interaction=nonstopmode -halt-on-error docs/corasdiagram-doc.tex
          latexmk -pdf -interaction=nonstopmode -halt-on-error examples/corasdiagram-minimal.tex
          latexmk -pdf -interaction=nonstopmode -halt-on-error examples/corasdiagram-demo.tex

      - name: Build black-and-white demo variant
        run: |
          export CORAS_BW_TEX="$RUNNER_TEMP/corasdiagram-demo-bw.tex"
          python3 - <<'PY'
          import os
          from pathlib import Path
          source = Path("examples/corasdiagram-demo.tex").read_text(encoding="utf-8")
          marker = r"\usepackage{corasdiagram}"
          replacement = r"\usepackage[iconset=bw]{corasdiagram}"
          if marker not in source:
              raise SystemExit("missing package line in examples/corasdiagram-demo.tex")
          Path(os.environ["CORAS_BW_TEX"]).write_text(
              source.replace(marker, replacement, 1),
              encoding="utf-8",
          )
          PY
          latexmk -pdf -interaction=nonstopmode -halt-on-error "$CORAS_BW_TEX"

      - name: Run semantic failure fixtures
        run: python3 tools/check_negative_tests.py --engine pdflatex

      - name: Build release bundle
        run: python3 tools/build_release.py --doc-pdf docs/corasdiagram-doc.pdf

      - name: Build Pages site
        run: |
          python3 tools/build_site.py \
            --docs-pdf docs/corasdiagram-doc.pdf \
            --demo-pdf examples/corasdiagram-demo.pdf \
            --minimal-pdf examples/corasdiagram-minimal.pdf

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: corasdiagram-release
          path: |
            dist/corasdiagram-*.zip
            corasdiagram-doc.pdf
            dist/site/

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/corasdiagram-*.zip
            corasdiagram-doc.pdf

  publish-ctan:
    name: Publish to CTAN
    needs: build-release
    runs-on: ubuntu-latest
    environment:
      name: ctan-release
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download release artifact
        uses: actions/download-artifact@v8
        with:
          name: corasdiagram-release
          path: release-artifact

      - name: Publish archive to CTAN
        env:
          CTAN_UPLOADER_NAME: ${{ secrets.CTAN_UPLOADER_NAME }}
          CTAN_UPLOADER_EMAIL: ${{ secrets.CTAN_UPLOADER_EMAIL }}
          CTAN_NOTE: Automated update from GitHub Actions for ${{ github.ref_name }}.
        run: |
          archive="$(find release-artifact -type f -name 'corasdiagram-*.zip' -print -quit)"
          test -n "$archive"
          python3 tools/upload_ctan.py --archive "$archive"
