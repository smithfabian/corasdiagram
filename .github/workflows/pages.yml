# Documentation-site workflow.
# Pages is built and deployed only from main branch pushes or manual dispatch,
# never from version tags.
name: Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pages: write

env:
  MKDOCS_MATERIAL_VERSION: '9.7.6'

jobs:
  build-site:
    name: Build documentation site
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TEXINPUTS: 'tex/latex//:'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install TeX and site tooling
        run: |
          sudo apt-get -o Acquire::Retries=3 update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            latexmk \
            lmodern \
            texlive-fonts-recommended \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-latex-recommended \
            texlive-pictures
          python3 -m pip install --upgrade pip
          python3 -m pip install "mkdocs-material==${MKDOCS_MATERIAL_VERSION}"

      - name: Build docs and examples
        run: |
          (
            cd examples
            export TEXINPUTS=../tex/latex//:
            for tex in *.tex; do
              latexmk -pdf -interaction=nonstopmode -halt-on-error "$tex"
            done
          )
          (
            cd manual
            export TEXINPUTS=../tex/latex//:
            latexmk -pdf -interaction=nonstopmode -halt-on-error corasdiagram-doc.tex
          )

      - name: Build Pages site
        run: |
          python3 tools/stage_mkdocs_assets.py --doc-pdf manual/corasdiagram-doc.pdf
          mkdocs build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy-pages:
    name: Deploy GitHub Pages
    needs: build-site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
