# Continuous integration for branch and pull-request work.
# This workflow validates builds, semantic failures, visual snapshots, and
# packaging smoke tests, but it does not publish any artifacts externally.
name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MKDOCS_MATERIAL_VERSION: '9.7.6'

jobs:
  compile:
    name: Build (${{ matrix.engine }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        engine:
          - pdflatex
          - lualatex
    env:
      TEXINPUTS: 'tex/latex//:'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install TeX and site tooling
        run: |
          packages=(
            latexmk
            lmodern
            texlive-fonts-recommended
            texlive-latex-base
            texlive-latex-extra
            texlive-latex-recommended
            texlive-pictures
          )
          if [ "${{ matrix.engine }}" = "lualatex" ]; then
            packages+=(texlive-luatex)
          fi
          sudo apt-get -o Acquire::Retries=3 update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends "${packages[@]}"

      - name: Prepare LuaTeX cache
        if: matrix.engine == 'lualatex'
        run: mkdir -p "$RUNNER_TEMP/texmf-var"

      - name: Build manual and examples
        run: |
          if [ "${{ matrix.engine }}" = "lualatex" ]; then
            export TEXMFVAR="$RUNNER_TEMP/texmf-var"
            export TEXMFCACHE="$TEXMFVAR"
          fi
          if [ "${{ matrix.engine }}" = "pdflatex" ]; then
            (
              cd examples
              export TEXINPUTS=../tex/latex//:
              for tex in *.tex; do
                latexmk -pdf -interaction=nonstopmode -halt-on-error "$tex"
              done
            )
            (
              cd manual
              export TEXINPUTS=../tex/latex//:
              latexmk -pdf -interaction=nonstopmode -halt-on-error corasdiagram-doc.tex
            )
          else
            (
              cd examples
              export TEXINPUTS=../tex/latex//:
              for tex in *.tex; do
                latexmk -lualatex -interaction=nonstopmode -halt-on-error "$tex"
              done
            )
            (
              cd manual
              export TEXINPUTS=../tex/latex//:
              latexmk -lualatex -interaction=nonstopmode -halt-on-error corasdiagram-doc.tex
            )
          fi

      - name: Build black-and-white demo variant
        run: |
          if [ "${{ matrix.engine }}" = "lualatex" ]; then
            export TEXMFVAR="$RUNNER_TEMP/texmf-var"
            export TEXMFCACHE="$TEXMFVAR"
          fi
          export CORAS_BW_TEX="$RUNNER_TEMP/corasdiagram-demo-bw.tex"
          python3 - <<'PY'
          import os
          from pathlib import Path
          source = Path("examples/corasdiagram-demo.tex").read_text(encoding="utf-8")
          marker = r"\usepackage{corasdiagram}"
          replacement = r"\usepackage[iconset=bw]{corasdiagram}"
          if marker not in source:
              raise SystemExit("missing package line in examples/corasdiagram-demo.tex")
          Path(os.environ["CORAS_BW_TEX"]).write_text(
              source.replace(marker, replacement, 1),
              encoding="utf-8",
          )
          PY
          if [ "${{ matrix.engine }}" = "pdflatex" ]; then
            latexmk -pdf -interaction=nonstopmode -halt-on-error "$CORAS_BW_TEX"
          else
            latexmk -lualatex -interaction=nonstopmode -halt-on-error "$CORAS_BW_TEX"
          fi

  negative-tests:
    name: Negative semantic tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TEXINPUTS: 'tex/latex//:'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install TeX
        run: |
          sudo apt-get -o Acquire::Retries=3 update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            lmodern \
            texlive-fonts-recommended \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-latex-recommended \
            texlive-pictures

      - name: Run semantic failure fixtures
        run: python3 tools/check_negative_tests.py --engine pdflatex

  visual-regressions:
    name: Visual regression tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TEXINPUTS: 'tex/latex//:'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install TeX and raster tooling
        run: |
          sudo apt-get -o Acquire::Retries=3 update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            lmodern \
            poppler-utils \
            texlive-fonts-recommended \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-latex-recommended \
            texlive-pictures

      - name: Run visual regression checks
        run: |
          python3 tools/check_visual_regressions.py \
            --artifact-dir "$RUNNER_TEMP/visual-regressions"

      - name: Upload actual renders on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: corasdiagram-visual-regressions
          path: ${{ runner.temp }}/visual-regressions/

  package-smoke:
    name: Packaging smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TEXINPUTS: 'tex/latex//:'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install TeX and site tooling
        run: |
          sudo apt-get -o Acquire::Retries=3 update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            latexmk \
            lmodern \
            texlive-fonts-recommended \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-latex-recommended \
            texlive-pictures
          python3 -m pip install --upgrade pip
          python3 -m pip install "mkdocs-material==${MKDOCS_MATERIAL_VERSION}"

      - name: Build docs and examples
        run: |
          (
            cd examples
            export TEXINPUTS=../tex/latex//:
            for tex in *.tex; do
              latexmk -pdf -interaction=nonstopmode -halt-on-error "$tex"
            done
          )
          (
            cd manual
            export TEXINPUTS=../tex/latex//:
            latexmk -pdf -interaction=nonstopmode -halt-on-error corasdiagram-doc.tex
          )

      - name: Build site and release bundle
        run: |
          python3 tools/build_release.py --doc-pdf manual/corasdiagram-doc.pdf
          python3 tools/stage_mkdocs_assets.py --doc-pdf manual/corasdiagram-doc.pdf
          mkdocs build

      - name: Upload packaging artifacts
        uses: actions/upload-artifact@v7
        with:
          name: corasdiagram-package-smoke
          path: |
            dist/corasdiagram-*.zip
            site/
