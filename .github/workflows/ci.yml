name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  compile:
    name: Build (${{ matrix.engine }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        engine:
          - pdflatex
          - lualatex
    env:
      TEXINPUTS: 'tex/latex//:'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install TeX and site tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            latexmk \
            poppler-utils \
            texlive-fonts-recommended \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-latex-recommended \
            texlive-luatex \
            texlive-pictures

      - name: Prepare LuaTeX cache
        run: mkdir -p "$TEXMFVAR"

      - name: Build manual and examples
        run: |
          if [ "${{ matrix.engine }}" = "lualatex" ]; then
            export TEXMFVAR="$RUNNER_TEMP/texmf-var"
            export TEXMFCACHE="$TEXMFVAR"
          fi
          if [ "${{ matrix.engine }}" = "pdflatex" ]; then
            latexmk -pdf -interaction=nonstopmode -halt-on-error docs/corasdiagram-doc.tex
            latexmk -pdf -interaction=nonstopmode -halt-on-error examples/corasdiagram-minimal.tex
            latexmk -pdf -interaction=nonstopmode -halt-on-error examples/corasdiagram-demo.tex
          else
            latexmk -lualatex -interaction=nonstopmode -halt-on-error docs/corasdiagram-doc.tex
            latexmk -lualatex -interaction=nonstopmode -halt-on-error examples/corasdiagram-minimal.tex
            latexmk -lualatex -interaction=nonstopmode -halt-on-error examples/corasdiagram-demo.tex
          fi

      - name: Build black-and-white demo variant
        run: |
          if [ "${{ matrix.engine }}" = "lualatex" ]; then
            export TEXMFVAR="$RUNNER_TEMP/texmf-var"
            export TEXMFCACHE="$TEXMFVAR"
          fi
          python3 - <<'PY'
          from pathlib import Path
          source = Path("examples/corasdiagram-demo.tex").read_text(encoding="utf-8")
          marker = r"\usepackage{corasdiagram}"
          replacement = r"\usepackage[iconset=bw]{corasdiagram}"
          if marker not in source:
              raise SystemExit("missing package line in examples/corasdiagram-demo.tex")
          Path("examples/.ci-corasdiagram-demo-bw.tex").write_text(
              source.replace(marker, replacement, 1),
              encoding="utf-8",
          )
          PY
          if [ "${{ matrix.engine }}" = "pdflatex" ]; then
            latexmk -pdf -interaction=nonstopmode -halt-on-error examples/.ci-corasdiagram-demo-bw.tex
          else
            latexmk -lualatex -interaction=nonstopmode -halt-on-error examples/.ci-corasdiagram-demo-bw.tex
          fi

  negative-tests:
    name: Negative semantic tests
    runs-on: ubuntu-latest
    env:
      TEXINPUTS: 'tex/latex//:'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install TeX
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-fonts-recommended \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-latex-recommended \
            texlive-pictures

      - name: Run semantic failure fixtures
        run: python3 tools/check_negative_tests.py --engine pdflatex

  package-smoke:
    name: Packaging smoke test
    runs-on: ubuntu-latest
    env:
      TEXINPUTS: 'tex/latex//:'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install TeX and site tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            latexmk \
            poppler-utils \
            texlive-fonts-recommended \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-latex-recommended \
            texlive-pictures

      - name: Build docs and examples
        run: |
          latexmk -pdf -interaction=nonstopmode -halt-on-error docs/corasdiagram-doc.tex
          latexmk -pdf -interaction=nonstopmode -halt-on-error examples/corasdiagram-minimal.tex
          latexmk -pdf -interaction=nonstopmode -halt-on-error examples/corasdiagram-demo.tex

      - name: Build site and release bundle
        run: |
          python3 tools/build_release.py --doc-pdf docs/corasdiagram-doc.pdf
          python3 tools/build_site.py \
            --docs-pdf docs/corasdiagram-doc.pdf \
            --demo-pdf examples/corasdiagram-demo.pdf \
            --minimal-pdf examples/corasdiagram-minimal.pdf

      - name: Upload packaging artifacts
        uses: actions/upload-artifact@v4
        with:
          name: corasdiagram-package-smoke
          path: |
            dist/corasdiagram-*.zip
            dist/site/
